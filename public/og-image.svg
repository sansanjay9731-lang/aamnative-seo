<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Main background gradient: deep ink to grove green -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1510;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#1F5C3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141F18;stop-opacity:1" />
    </linearGradient>

    <!-- Saffron glow radial for right panel -->
    <radialGradient id="saffronGlow" cx="75%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#E07B16;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#E07B16;stop-opacity:0" />
    </radialGradient>

    <!-- Right panel gradient -->
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F5C3A;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#E07B16;stop-opacity:0.18" />
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="divLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59A3A;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#F59A3A;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#F59A3A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F59A3A;stop-opacity:0" />
    </linearGradient>

    <!-- Noise texture filter for depth -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Leaf/mango decorative clip -->
    <clipPath id="circleClip">
      <circle cx="870" cy="315" r="220"/>
    </clipPath>
  </defs>

  <!-- ── Base background ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ── Subtle texture overlay ── -->
  <rect width="1200" height="630" fill="rgba(255,255,255,0.015)" filter="url(#noise)"/>

  <!-- ── Saffron atmospheric glow ── -->
  <rect width="1200" height="630" fill="url(#saffronGlow)"/>

  <!-- ── Decorative circle background (right side) ── -->
  <circle cx="870" cy="315" r="260" fill="rgba(31,92,58,0.35)" />
  <circle cx="870" cy="315" r="220" fill="rgba(224,123,22,0.08)" stroke="rgba(245,154,58,0.2)" stroke-width="1.5"/>

  <!-- ── Large mango silhouette (decorative) ── -->
  <!-- Mango body -->
  <ellipse cx="870" cy="300" rx="115" ry="155" fill="rgba(224,123,22,0.12)" transform="rotate(-15,870,300)"/>
  <ellipse cx="870" cy="300" rx="95" ry="130" fill="rgba(245,154,58,0.1)" transform="rotate(-15,870,300)"/>
  <!-- Mango shine -->
  <ellipse cx="845" cy="250" rx="28" ry="42" fill="rgba(255,255,255,0.06)" transform="rotate(-15,845,250)"/>

  <!-- Leaf 1 -->
  <ellipse cx="930" cy="165" rx="12" ry="48" fill="rgba(39,114,74,0.6)" transform="rotate(25,930,165)"/>
  <ellipse cx="932" cy="163" rx="4" ry="44" fill="rgba(0,168,107,0.3)" transform="rotate(25,932,163)"/>

  <!-- Leaf 2 -->
  <ellipse cx="960" cy="180" rx="10" ry="42" fill="rgba(39,114,74,0.45)" transform="rotate(50,960,180)"/>

  <!-- Leaf 3 -->
  <ellipse cx="905" cy="160" rx="9" ry="36" fill="rgba(31,92,58,0.55)" transform="rotate(5,905,160)"/>

  <!-- ── Dot pattern (editorial texture) ── -->
  <g fill="rgba(245,154,58,0.12)">
    <circle cx="100" cy="80" r="2.5"/><circle cx="140" cy="80" r="2.5"/><circle cx="180" cy="80" r="2.5"/>
    <circle cx="220" cy="80" r="2.5"/><circle cx="260" cy="80" r="2.5"/>
    <circle cx="100" cy="120" r="2.5"/><circle cx="140" cy="120" r="2.5"/><circle cx="180" cy="120" r="2.5"/>
    <circle cx="220" cy="120" r="2.5"/><circle cx="260" cy="120" r="2.5"/>
    <circle cx="100" cy="160" r="2.5"/><circle cx="140" cy="160" r="2.5"/><circle cx="180" cy="160" r="2.5"/>
  </g>

  <!-- ── Thin saffron top border ── -->
  <rect x="0" y="0" width="1200" height="3" fill="rgba(245,154,58,0.6)"/>

  <!-- ── Vertical divider line ── -->
  <rect x="680" y="80" width="1" height="470" fill="url(#divLine)"/>

  <!-- ══════════════════════════════════
       LEFT SIDE — Text Content
       ══════════════════════════════════ -->

  <!-- Eyebrow label -->
  <rect x="72" y="108" width="6" height="6" rx="1" fill="#F59A3A"/>
  <text x="88" y="119" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="700"
        letter-spacing="3" fill="rgba(245,154,58,0.85)" text-transform="uppercase">
    RATNAGIRI · GI CERTIFIED · SINCE 1968
  </text>

  <!-- Main brand name -->
  <text x="70" y="228" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700"
        fill="#FDFAF5" letter-spacing="-2">
    Aam
  </text>
  <text x="70" y="328" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="300"
        font-style="italic" fill="#F59A3A" letter-spacing="-1">
    Native
  </text>

  <!-- Tagline -->
  <text x="70" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400"
        fill="rgba(253,250,245,0.7)" letter-spacing="0.5">
    India's Finest Alphonso Mangoes
  </text>

  <!-- Divider dash -->
  <rect x="70" y="415" width="48" height="2" rx="1" fill="#E07B16"/>

  <!-- Feature pills row -->
  <!-- Pill 1 -->
  <rect x="70" y="436" width="148" height="30" rx="15" fill="rgba(31,92,58,0.6)" stroke="rgba(39,114,74,0.5)" stroke-width="1"/>
  <text x="144" y="456" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="600"
        fill="#FDFAF5" text-anchor="middle" letter-spacing="0.5">Farm Direct</text>

  <!-- Pill 2 -->
  <rect x="230" y="436" width="148" height="30" rx="15" fill="rgba(31,92,58,0.6)" stroke="rgba(39,114,74,0.5)" stroke-width="1"/>
  <text x="304" y="456" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="600"
        fill="#FDFAF5" text-anchor="middle" letter-spacing="0.5">Zero Carbide</text>

  <!-- Pill 3 -->
  <rect x="390" y="436" width="160" height="30" rx="15" fill="rgba(31,92,58,0.6)" stroke="rgba(39,114,74,0.5)" stroke-width="1"/>
  <text x="470" y="456" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="600"
        fill="#FDFAF5" text-anchor="middle" letter-spacing="0.5">24–48 Hr Delivery</text>

  <!-- URL / CTA -->
  <text x="70" y="524" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="400"
        fill="rgba(245,154,58,0.7)" letter-spacing="1">
    aamnative.com
  </text>

  <!-- ══════════════════════════════════
       RIGHT SIDE — Stats / Badges
       ══════════════════════════════════ -->

  <!-- GI Badge -->
  <circle cx="870" cy="210" r="64" fill="rgba(12,21,16,0.7)" stroke="rgba(245,154,58,0.4)" stroke-width="1.5"/>
  <text x="870" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700"
        fill="rgba(245,154,58,0.9)" text-anchor="middle" letter-spacing="2">GI TAGGED</text>
  <text x="870" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700"
        fill="#FDFAF5" text-anchor="middle">Hapus</text>
  <text x="870" y="236" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="rgba(253,250,245,0.5)"
        text-anchor="middle" letter-spacing="1">ALPHONSO</text>

  <!-- Stat 1 — Rating -->
  <rect x="740" y="305" width="130" height="70" rx="12" fill="rgba(12,21,16,0.65)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="805" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700"
        fill="#F59A3A" text-anchor="middle">4.9★</text>
  <text x="805" y="352" font-family="Georgia, 'Times New Roman', serif" font-size="11"
        fill="rgba(253,250,245,0.5)" text-anchor="middle" letter-spacing="0.5">749 Reviews</text>

  <!-- Stat 2 — Orders -->
  <rect x="890" y="305" width="130" height="70" rx="12" fill="rgba(12,21,16,0.65)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="955" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700"
        fill="#F59A3A" text-anchor="middle">2,847</text>
  <text x="955" y="352" font-family="Georgia, 'Times New Roman', serif" font-size="11"
        fill="rgba(253,250,245,0.5)" text-anchor="middle" letter-spacing="0.5">Orders This Season</text>

  <!-- Price tag -->
  <rect x="790" y="408" width="160" height="48" rx="24" fill="rgba(224,123,22,0.9)"/>
  <text x="870" y="429" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="600"
        fill="rgba(12,21,16,0.7)" text-anchor="middle" letter-spacing="1">BOXES FROM</text>
  <text x="870" y="449" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700"
        fill="#0C1510" text-anchor="middle">₹849 · 3 kg · Pan India</text>

  <!-- ── Bottom border ── -->
  <rect x="0" y="627" width="1200" height="3" fill="rgba(31,92,58,0.6)"/>

</svg>
